# =========================
# FRONTEND — atlas.ostwald.top + local
# =========================
server {
    listen 80;
    server_name atlas.ostwald.top localhost 127.0.0.1;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para o backend via path /api/
    # ATENÇÃO: proxy_pass SEM barra no final = mantém o /api/ no path
    # Use ASSIM SE seu backend espera rotas como /api/login, /api/users etc.
    location /api/ {
        proxy_pass http://backend:8080;   # <-- sem barra final!

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }
}

# =========================
# API SUBDOMAIN — apiatlas.ostwald.top
# Cloudflared aponta esse domínio pra porta 3000
# O NGINX aqui encaminha tudo pro backend
# =========================
server {
    listen 80;
    server_name apiatlas.ostwald.top;

    location / {
        proxy_pass http://backend:8080;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }
}
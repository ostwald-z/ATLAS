<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlas Vault</title>
  <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/argon2-browser@1.18.0/dist/argon2-bundled.min.js"></script>
    
    <script type="module">
    import sodium from "https://cdn.jsdelivr.net/npm/libsodium-wrappers@0.7.13/+esm";

    await sodium.ready;

    window.sodium = sodium;
    window._sodiumReady = true;

    console.log("libsodium pronto (ESM)");
    </script>
    
</head>
<body>


  <!-- TELA 1: Selecionar arquivo | https://cdn.jsdelivr.net/npm/libsodium-wrappers@0.7.13/dist/modules/libsodium-wrappers.js-->
  <div id="screen-open" class="screen active">
    <div class="center-box">
      <div class="logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <polygon points="20,2 38,10 38,30 20,38 2,30 2,10" stroke="#888" stroke-width="1.5" fill="none"/>
          <polygon points="20,8 32,14 32,26 20,32 8,26 8,14" stroke="#666" stroke-width="1" fill="none"/>
          <circle cx="20" cy="20" r="3" fill="#888"/>
        </svg>
        <span>ATLAS VAULT</span>
      </div>

      <p class="subtitle">Selecione um arquivo de vault</p>

      <div id="drop-zone" class="drop-zone" onclick="document.getElementById('file-input').click()">
        <span id="drop-label">Clique para abrir arquivo .pvt</span>
      </div>
      <input type="file" id="file-input" accept=".pvt,.bin" style="display:none">

      <div id="error-open" class="error-msg" style="display:none"></div>
      <div class="or-divider">ou</div>
      <button class="btn-secondary-link" onclick="showScreen('create')">+ Criar novo vault</button>

    </div>
  </div>

  <!-- TELA 2: Inserir senha -->
  <div id="screen-password" class="screen">
    <div class="center-box">
      <div class="logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <polygon points="20,2 38,10 38,30 20,38 2,30 2,10" stroke="#888" stroke-width="1.5" fill="none"/>
          <polygon points="20,8 32,14 32,26 20,32 8,26 8,14" stroke="#666" stroke-width="1" fill="none"/>
          <circle cx="20" cy="20" r="3" fill="#888"/>
        </svg>
        <span>ATLAS VAULT</span>
      </div>

      <p class="subtitle" id="vault-filename">vault.vault</p>

      <input type="password" id="password-input" class="pass-input" placeholder="Senha mestra" autocomplete="off" spellcheck="false">

      <button id="btn-unlock" class="btn-primary" onclick="unlockVault()">Abrir Vault</button>

      <div id="error-pass" class="error-msg" style="display:none"></div>

      <a href="#" class="back-link" onclick="goBack()">← Trocar arquivo</a>
    </div>
  </div>

  <!-- TELA 3: Vault aberto -->
  <div id="screen-vault" class="screen">
    <div class="vault-header">
      <div class="logo small">
        <svg width="24" height="24" viewBox="0 0 40 40" fill="none">
          <polygon points="20,2 38,10 38,30 20,38 2,30 2,10" stroke="#888" stroke-width="1.5" fill="none"/>
          <circle cx="20" cy="20" r="3" fill="#888"/>
        </svg>
        <span>ATLAS VAULT</span>
        <button class="btn-save" onclick="packageAndDownload()">
          <svg viewBox="0 0 24 24" fill="none">
              <path d="M12 3V15" />
              <path d="M7 10L12 15L17 10" />
              <path d="M5 21H19" />
          </svg>

          <span>Salvar Vault</span>
        </button>
      </div>
      <div class="vault-actions">
        <span id="vault-info" class="vault-info"></span>
        <button class="btn-primary small-btn" style="width: auto;" onclick="createNewSecret()">+ Novo Segredo</button>
        <button class="btn-danger" onclick="lockVault()">Bloquear</button>
      </div>
    </div>

    <div class="vault-body">
      <div id="entries-list" class="entries-list">
        </div>

      <div id="secret-panel" class="secret-panel" style="display: none;">
        <div class="panel-header">
          <h3 id="panel-title">Detalhes do Segredo</h3>
          <div class="panel-actions">
            <button id="btn-delete" class="btn-danger small-btn" onclick="deleteSecret()">Excluir</button>
            <button id="btn-edit" class="btn-primary small-btn" onclick="toggleEdit()">Editar</button>
            <button class="btn-danger small-btn" onclick="closePanel()">Fechar</button>
          </div>
        </div>
        
        <div class="panel-content">
          <div class="save-area">
            <button id="btn-apply-edit" class="btn-primary" style="display:none;" onclick="applyEdits()">Aplicar Alterações</button>
          </div>
          <input type="hidden" id="panel-index">
          
          <label class="panel-label">Título</label>
          <input type="text" id="panel-titulo" class="pass-input" readonly>
          
          <label class="panel-label">Usuário</label>
          <input type="text" id="panel-user" class="pass-input" readonly>
          
          <label class="panel-label">Senha</label>
          <div class="pass-wrapper">
             <input type="password" id="panel-senha" class="pass-input" readonly>
             <button class="btn-primary view-btn" onclick="toggleViewPass('panel-senha')">👁</button>
          </div>
          
          <label class="panel-label">Serviço / Link</label>
          <input type="text" id="panel-servico" class="pass-input" readonly>
          
          <label class="panel-label">Observações</label>
          <textarea id="panel-obs" class="pass-input textarea" readonly></textarea>
        </div>
      </div>
    </div>
  </div>




  <!-- TELA 4: Criar novo vault -->
<div id="screen-create" class="screen">
  <div class="center-box">
    <div class="logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <polygon points="20,2 38,10 38,30 20,38 2,30 2,10" stroke="#888" stroke-width="1.5" fill="none"/>
        <polygon points="20,8 32,14 32,26 20,32 8,26 8,14" stroke="#666" stroke-width="1" fill="none"/>
        <circle cx="20" cy="20" r="3" fill="#888"/>
      </svg>
      <span>ATLAS VAULT</span>
    </div>

    <p class="subtitle">Criar novo vault</p>

    <input type="text"     id="create-name"    class="pass-input" placeholder="Nome do vault (ex: pessoal)" autocomplete="off" spellcheck="false">
    <input type="password" id="create-pass"    class="pass-input" placeholder="Senha mestra" autocomplete="off" spellcheck="false">
    <input type="password" id="create-pass2"   class="pass-input" placeholder="Confirmar senha" autocomplete="off" spellcheck="false">
    


    <div id="create-strength" class="strength-bar-wrap" style="display:none">
      <div id="create-strength-bar" class="strength-bar"></div>
      <span id="create-strength-label" class="strength-label"></span>
    </div>

    <button id="btn-create" class="btn-primary" onclick="createVault()">Criar e Baixar .pvt</button>

    <div id="error-create" class="error-msg" style="display:none"></div>

    <a href="#" class="back-link" onclick="showScreen('open')">← Voltar</a>
  </div>
</div>






<!-- TELA 5: Vault Bloqueado -->
<div id="screen-locked" class="screen">
  <div class="center-box">
    <div class="logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <polygon points="20,2 38,10 38,30 20,38 2,30 2,10" stroke="#888" stroke-width="1.5" fill="none"/>
        <polygon points="20,8 32,14 32,26 20,32 8,26 8,14" stroke="#666" stroke-width="1" fill="none"/>
        <circle cx="20" cy="20" r="3" fill="#888"/>
      </svg>
      <span>ATLAS VAULT</span>
    </div>

    <p class="subtitle" id="locked-filename"></p>
    <p class="locked-hint">vault bloqueado</p>

    <input type="password" id="locked-pass-input" class="pass-input"
           placeholder="Senha mestra" autocomplete="off" spellcheck="false">

    <button id="btn-unlock-locked" class="btn-primary" onclick="unlockLocked()">Desbloquear</button>

    <div id="error-locked" class="error-msg" style="display:none"></div>

    <a href="#" class="back-link" onclick="fullReset()">← Trocar arquivo</a>
  </div>
</div>







  <script src="vault.js"></script>
</body>
</html>

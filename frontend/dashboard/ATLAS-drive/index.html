<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas Drive</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="app-header">
    <div class="header-left">
      <span class="brand-logo">atlas <span class="sub-logo">drive</span></span>
    </div>
    <div class="header-right">
      <button id="darkModeToggle" class="theme-btn" title="Alternar tema">🌙</button>
    </div>
  </header>

  <main class="app-container">
    <nav class="breadcrumb-container" id="breadcrumbs">
      </nav>

    <div class="actions-bar">
      <button id="newFolderBtn" class="action-btn">+ Nova pasta</button>
      <button id="newTxtBtn" class="action-btn">📄 Criar TXT</button>
      </div>


    <section class="drive-section">
      <div class="drive-header-row">
        <span class="col-main">Nome</span>
        <span class="col-meta">Tamanho</span>
      </div>

      <div id="fileListContainer" class="file-list-container">
        <div class="loading-state">Carregando seus arquivos...</div>
      </div>
    </section>
  </main>


  <dialog id="folderModal" class="minimal-modal">
    <form method="dialog">
      <p class="modal-title">Nova pasta</p>
      <input type="text" id="folderNameInput" placeholder="Nome da pasta" autocomplete="off" required />
      <div class="modal-actions">
        <button type="button" id="cancelModalBtn" class="action-btn text-only">Cancelar</button>
        <button type="submit" class="action-btn primary">Criar</button>
      </div>
    </form>
  </dialog>


  <dialog id="editorModal" class="minimal-modal editor-modal">
    <div class="editor-header">
      <span id="editorFilename" class="modal-title">arquivo.txt</span>
    </div>
    <textarea id="editorTextarea" placeholder="Comece a digitar seu texto aqui..."></textarea>
    <div class="modal-actions">
      <button type="button" id="cancelEditorBtn" class="action-btn text-only">Cancelar</button>
      <button type="button" id="saveEditorBtn" class="action-btn primary">Salvar Arquivo</button>
    </div>
  </dialog>


  <script src="../../config.js"></script>
  <script src="script.js"></script>
</body>
</html>

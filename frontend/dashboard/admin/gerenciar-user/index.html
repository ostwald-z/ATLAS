<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador Usuários ATLAS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

 <!-- Header -->
    <header class="atlas-header">
        <h1>ATLAS <span>Admin</span></h1>
        <p>Gerenciador de Usuários</p>
    </header>

    <!-- <h1 class="page-title">
        Gerenciador Usuários <span>ATLAS</span>
    </h1> -->


    <div class="admin-layout">

        <!-- ===== SIDEBAR / HUD LISTAGEM ===== -->
        <aside class="sidebar">

            <div class="user-filter">

                <input 
                    type="text" 
                    id="filtroId" 
                    placeholder="ID do usuário">


                <button id="listarUsuarioBtnEspecifico" class="filter-button">
                    Listar
                </button>

            </div>

            <button id="listarUsuariosBtn" class="sidebar-button" type="button">
                Listar Usuários
            </button>

            <div class="user-list">
                <!-- JS VAI INJETAR AQUI -->
                
                <!-- <div class="user-item">
                    <p class="user-id">ID: 1</p>
                    <p class="user-name">Nome: SenhorZ</p>
                    <p class="user-email">Email: z@gmail.com</p>                                      
                </div>   -->


            </div>

        </aside>

        <!-- ===== PAINEL PRINCIPAL ===== -->
        <main class="panel">

            <form class="user-form">

                <div class="form-group">
                    <label for="userId">ID do Usuário</label>
                    <input type="text" id="userId">
                </div>

                <div class="form-group">
                    <label for="nome">Novo Nome</label>
                    <input type="text" id="nome">
                </div>

                <div class="form-group">
                    <label for="email">Novo Email</label>
                    <input type="email" id="email">
                </div>

                <div class="form-group">
                    <label for="senha">Nova Senha</label>
                    <input type="password" id="senha">
                </div>

                <div class="form-group">
                    <label for="privilegio">Privilégio</label>
                    <select id="privilegio">
                        <option value="user">user</option>
                        <option value="admin">admin</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="obs">Observações</label>
                    <textarea id="obs" rows="4"></textarea>
                </div>

                <button type="submit" class="deletar-button" id="deletarUser">
                    Deletar Usuário
                </button>

                <button type="submit" class="action-button" id="aplicarPatch">
                    Aplicar Alterações
                </button>

            </form>

        </main>

    </div>

    <script src="../../../config.js"></script>
    <script src="script.js"></script>
</body>
</html>

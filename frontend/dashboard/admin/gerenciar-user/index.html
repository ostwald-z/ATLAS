<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATLAS — Gerenciar Usuários</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-grid"></div>

  <header class="header">
    <div class="logo">
      <span class="logo-mark">▲</span>
      <span class="logo-text">ATLAS</span>
      <span class="logo-role">admin</span>
    </div>

    <div class="header-actions">
      <button id="themeToggle" class="icon-btn" aria-label="Alternar tema">
        <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
      </button>

      <div class="profile-wrap">
        <button id="profileBtn" class="profile-btn" aria-label="Meu perfil" aria-expanded="false">
          <span class="profile-avatar" id="profileAvatar">—</span>
          <svg class="profile-chevron" xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>

        <div id="profileDropdown" class="profile-dropdown" aria-hidden="true">
          <div class="dropdown-header">
            <div class="dropdown-avatar" id="dropdownAvatar">—</div>
            <div class="dropdown-info">
              <span class="dropdown-role">Administrador</span>
              <span class="dropdown-id" id="dropdownId">Carregando...</span>
            </div>
          </div>
          <div class="dropdown-divider"></div>
          <a href="../index.html" class="dropdown-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Voltar ao Painel
          </a>
          <button id="btnLogout" class="dropdown-item dropdown-item--danger">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sair da conta
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="page-intro">
      <p class="page-label">Módulo de Controle</p>
      <h1 class="page-title">Gerenciar Usuários</h1>
    </div>

    <div class="toolbar card">
      <form id="formBusca" class="search-wrap">
        <input type="text" id="filtroId" class="atlas-input" placeholder="Buscar por ID do usuário...">
        <button type="submit" class="btn-primary" id="listarUsuarioBtnEspecifico">Procurar</button>
      </form>
      <button type="button" class="btn-ghost" id="listarUsuariosBtn">Listar Todos</button>
    </div>

    <div class="user-list-header">
      <span>Usuário</span>
      <span class="hide-mobile">Contato</span>
      <span>Nível</span>
      <span>Ação</span>
    </div>
    
    <div class="user-container" id="userContainer">
      <div class="empty-state" id="emptyState">
        <p>Clique em "Listar Todos" ou busque por um ID.</p>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="editModal">
    <div class="modal-card">
      <div class="modal-header">
        <h2 class="modal-title">Editar Usuário</h2>
        <button class="btn-close" id="closeModalBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <form id="editForm" class="atlas-form">
        <input type="hidden" id="userId">
        
        <!--- BEM AQUI, PRIMEIRO DE TUDO, ADICIONA NOVO CAMPO PARA IR O NOME E SOBRENOME DO USUÁRIO  --->
        <div class="form-group">
          <label class="atlas-label" for="nomeSobrenome">Nome e Sobrenome</label>
          <input type="text" id="nomeSobrenome" class="atlas-input" placeholder="Nome e sobrenome do usuário">
        </div>


        <div class="form-row">
          
          <div class="form-group">
            <label class="atlas-label" for="nome">Usuário</label>
            <input type="text" id="nome" class="atlas-input" placeholder="Nome do usuário">
          </div>
          <div class="form-group">
            <label class="atlas-label" for="privilegio">Privilégio</label>
            <select id="privilegio" class="atlas-input">
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="atlas-label" for="email">E-mail</label>
            <input type="email" id="email" class="atlas-input" placeholder="email@exemplo.com">
          </div>
          <div class="form-group">
            <label class="atlas-label" for="senha">Nova Senha</label>
            <input type="password" id="senha" class="atlas-input" placeholder="Deixe em branco para manter">
          </div>
        </div>

        <div class="form-group">
          <label class="atlas-label" for="obs">Observações</label>
          <textarea id="obs" rows="3" class="atlas-input" placeholder="Anotações internas..."></textarea>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-danger" id="deletarUser">Deletar Usuário</button>
          <button type="submit" class="btn-primary" id="aplicarPatch">Salvar Alterações</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="../../../config.js"></script>
  <script src="script.js"></script>
</body>
</html>

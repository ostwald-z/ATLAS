<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>ATLAS Drive</title>


  <link rel="stylesheet" href="style.css">

</head>
<body>
    <!-- ==========================
      PROGRESS BAR GLOBAL
  ========================== -->
  <div id="progressWrapper" class="progress-wrapper">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- ==========================
       SIDEBAR
       ========================== -->
  <div class="sidebar">
    <div class="logo">ATLAS</div>

    <div class="sidebar-section">Principal</div>
    <div class="nav-item active" onclick="fetchFiles('/')">
      <span class="nav-icon">⊞</span> Início
    </div>
    <div class="nav-item">
      <span class="nav-icon">◷</span> Recentes
    </div>
    <div class="nav-item">
      <span class="nav-icon">☆</span> Favoritos
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-section">Sistema</div>
    <div class="nav-item">
      <span class="nav-icon">⊘</span> Lixeira
    </div>
  </div>

  <!-- ==========================
       MAIN AREA
       ========================== -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <button id="backButton" title="Voltar">← Voltar</button>
      <div class="path" id="currentPath"></div>
      <div class="actions">
        <button onclick="uploadFile()">↑ Upload</button>
      </div>
    </div>

    <div class="list-header">
      <div class="list-header-cell"></div>
      <div class="list-header-cell">Nome</div>
      <div class="list-header-cell">Tipo</div>
      <div class="list-header-cell">Tamanho</div>
      <div class="list-header-cell">Ext.</div>
    </div>

    <!-- FILES GRID -->
    <div class="file-container" id="fileContainer">

      <!-- ==========================
           TEMPLATE DE ARQUIVO
           DUPLICAR VIA JS
      ========================== -->

      <!-- EXEMPLO ESTÁTICO -->
      <!--<div class="file-card" onclick="openItem('pasta1')">
        <div class="file-icon">📁</div>
        <div class="file-name">Pasta 1</div>
        <div class="file-meta">Pasta</div>
      </div>

      <div class="file-card" onclick="openItem('arquivo.txt')">
        <div class="file-icon">📄</div>
        <div class="file-name">arquivo.txt</div>
        <div class="file-meta">2 KB</div>
      </div> -->

    </div>
  </div>



  <div id="contextMenu" class="context-menu">
    <div class="context-menu-item" id="visualizarItem">Visualizar Item</div>
    <div class="context-menu-item" id="downloadOption">Baixar arquivo</div>
    <div class="context-menu-item" id="MudarNomeOption">Renomear Item</div>
    <div class="context-menu-item" id="deletarArquivo">Deletear Item</div>

      <!-- 🔥 NOVOS ITENS (área vazia) -->
    <div class="context-menu-item" id="criarArquivo">Criar documento de texto</div>
    <div class="context-menu-item" id="criarPasta">Criar nova pasta</div>
  </div>



  <!-- ==========================
      MODAL RENOMEAR ARQUIVO
  ========================== -->
  <div id="renameModal" class="rename-modal">
    <div class="rename-box">
      <h3>Renomear Item</h3>
      <input type="text" id="renameInput" placeholder="Novo nome..." />
      
      <div class="rename-actions">
        <button id="cancelRename">Cancelar</button>
        <button id="confirmRename">Salvar</button>
      </div>
    </div>
  </div>


  
  <div id="previewModal" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(2,6,23,0.85);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;

    opacity: 0;
    pointer-events: none;
    transition: 0.25s;
  ">
    <div style="
      width: 80%;
      height: 80%;
      background: #020617;
      border-radius: 12px;
      border: 1px solid rgba(34,211,238,0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    ">

      <!-- HEADER -->
      <div id="previewHeader" style="
        padding: 15px 20px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        font-size: 18px;
        color: var(--neon);
        font-weight: bold;
      ">
        Nome do arquivo
      </div>

      <!-- CONTEÚDO -->
      <div id="previewContent" style="
        flex: 1;
        padding: 20px;
        overflow: auto;
      ">
      </div>

    </div>
  </div>


  <div id="selectionBox" style="
    position: fixed;
    border: 1px dashed #22d3ee;
    background: rgba(34, 211, 238, 0.1);
    pointer-events: none;
    display: none;
    z-index: 9999;
  "></div>



  <div id="selectionInfo" style="
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #0f172a;
    border: 1px solid rgba(34,211,238,0.2);
    border-radius: 12px;
    padding: 12px 16px;
    color: #e2e8f0;
    font-size: 13px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    display: none;
    max-width: 260px;
    z-index: 9999;
  ">
  </div>


  <!-- PAINEL DE TRANSFERÊNCIAS (canto inferior esquerdo) -->
  <div id="transferPanel" style="
    position: fixed;
    bottom: 20px;
    left: 20px;
    width: 320px;
    background: #0f172a;
    border: 1px solid rgba(34,211,238,0.2);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    z-index: 9998;
    display: none;
    flex-direction: column;
  ">
    <!-- HEADER -->
    <div style="
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
    " id="transferPanelHeader">
      <span style="color:#e2e8f0; font-size:13px; font-weight:600;">Transferências</span>
      <div style="display:flex; gap:10px; align-items:center;">
        <span id="transferToggleIcon" style="color:#94a3b8; font-size:16px;">▾</span>
        <span id="transferCloseBtn" style="color:#94a3b8; font-size:16px; cursor:pointer;">✕</span>
      </div>
    </div>

    <!-- LISTA DE TAREFAS -->
    <div id="transferList" style="
      max-height: 280px;
      overflow-y: auto;
      padding: 8px 0;
    "></div>
  </div>




  <script src="script.js"></script>




</body>
</html>

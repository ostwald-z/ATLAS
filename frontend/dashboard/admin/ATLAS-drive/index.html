<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>ATLAS Drive</title>
  <style>
    /* ==========================
       ROOT VARIABLES (THEME)
    ========================== */
    :root {
      --bg: #020617;
      --panel: #0f172a;
      --neon: #22d3ee;
      --text-secondary: #94a3b8;
      --text-primary: #e2e8f0;
    }

    /* ==========================
       GLOBAL RESET
    ========================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ==========================
      MODAL RENAME UX
    ========================== */
    .rename-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(2, 6, 23, 0.7);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;

      opacity: 0;
      pointer-events: none;
      transition: 0.25s ease;
    }

    .rename-modal.active {
      opacity: 1;
      pointer-events: all;
    }

    .rename-box {
      background: var(--panel);
      padding: 25px;
      border-radius: 12px;
      width: 300px;
      border: 1px solid rgba(34, 211, 238, 0.2);

      transform: scale(0.9);
      transition: 0.25s ease;
    }

    .rename-modal.active .rename-box {
      transform: scale(1);
    }

    .rename-box h3 {
      margin-bottom: 15px;
      color: var(--neon);
    }

    .rename-box input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      background: #020617;
      color: var(--text-primary);
      margin-bottom: 15px;
      outline: none;
    }

    .rename-box input:focus {
      border-color: var(--neon);
    }

    .rename-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .rename-actions button {
      padding: 8px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: 0.2s;
    }

    #cancelRename {
      background: transparent;
      color: var(--text-secondary);
    }

    #cancelRename:hover {
      color: white;
    }

    #confirmRename {
      background: var(--neon);
      color: black;
      font-weight: bold;
    }

    #confirmRename:hover {
      transform: scale(1.05);
    }

    /* ==========================
       SIDEBAR (LEFT PANEL)
    ========================== */
    .sidebar {
      width: 250px;
      background: var(--panel);
      padding: 20px;
      border-right: 1px solid rgba(255,255,255,0.05);
    }

    .logo {
      font-size: 20px;
      color: var(--neon);
      margin-bottom: 30px;
      letter-spacing: 2px;
    }

    .nav-item {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .nav-item:hover {
      background: rgba(34, 211, 238, 0.1);
      color: var(--neon);
    }



/* ==========================
       MENU DE CONTEXTO (BOTÃO DIREITO)
    ========================== */
    .context-menu {
      position: absolute;
      background: var(--panel);
      border: 1px solid rgba(34, 211, 238, 0.2);
      border-radius: 10px;
      padding: 6px 0;
      min-width: 170px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);

      opacity: 0;
      transform: scale(0.92) translateY(8px);
      transform-origin: top left;

      pointer-events: none;
      transition: 
        opacity 0.18s ease,
        transform 0.18s ease;

      z-index: 1000;
    }

    .context-menu.active {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
    }

    .context-menu-item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.15s ease;
      position: relative;
    }

    .context-menu-item:hover {
      background: rgba(34, 211, 238, 0.08);
      color: var(--neon);
      padding-left: 20px;
    }

    /* barrinha neon lateral estilo SaaS */
    .context-menu-item::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0px;
      background: var(--neon);
      transition: 0.15s ease;
    }

    .context-menu-item:hover::before {
      width: 3px;
    }


    /* ==========================
      GLOBAL PROGRESS BAR
    ========================== */
    .progress-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: transparent;
      z-index: 9999;

      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .progress-wrapper.active {
      opacity: 1;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22d3ee, #0ea5e9);
      box-shadow: 0 0 10px #22d3ee;
      transition: width 0.1s linear;
    }


    /* ==========================
       MAIN CONTENT
    ========================== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* TOP BAR */
    .topbar {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    
    #backButton {
      font-size: 20px;
      background: none;
      border: none;
      color: var(--neon);
      cursor: pointer;
      transition: 0.2s;
    }

    #backButton:hover {
      color: var(--neon);
      transform: scale(1.2);
    }


    .path {
      font-size: 14px;
      color: var(--text-secondary);
    }

    

    .actions button {
      background: var(--neon);
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      color: black;
      font-weight: bold;
    }

    /* FILE GRID */
    .file-container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 20px;
      overflow-y: auto;
    }

    .file-card {
      background: var(--panel);
      padding: 15px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid transparent;
    }

    .file-card:hover {
      border: 1px solid var(--neon);
      transform: scale(1.03);
    }


    .file-icon {
      font-size: 30px;
      margin-bottom: 10px;
    }

    .file-name {
      font-size: 14px;
      word-break: break-word;
    }

    .file-meta {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 5px;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--neon);
      border-radius: 10px;
    }

    .path-segment {
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      color: #94a3b8;
      transition: 0.2s;
      border: 1px solid transparent;
    }

    .path-segment:hover {
      color: #22d3ee;
      background: rgba(34, 211, 238, 0.08);
    }

    .path-segment.drop-hover {
      border: 1px solid #22d3ee;
      background: rgba(34, 211, 238, 0.15);
    }


    .file-container.drag-over {
      border: 2px dashed #22d3ee;
      background: rgba(34, 211, 238, 0.05);
    }


    
    /* AREA QUE APARECE PROGRESSÃO DE TRANSFERENCIAS */
    .transfer-item {
      padding: 10px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.2s;
    }

    .transfer-item:hover {
      background: rgba(255,255,255,0.02);
    }

    .transfer-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .transfer-item-name {
      font-size: 12px;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .transfer-item-status {
      font-size: 11px;
      color: #94a3b8;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .transfer-item-status.done {
      color: #22d3ee;
    }

    .transfer-item-status.error {
      color: #f87171;
    }

    .transfer-bar-bg {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      overflow: hidden;
    }

    .transfer-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22d3ee, #0ea5e9);
      box-shadow: 0 0 6px #22d3ee66;
      border-radius: 10px;
      transition: width 0.1s linear;
    }

    .transfer-bar-fill.done {
      background: linear-gradient(90deg, #22d3ee, #06b6d4);
      box-shadow: none;
    }

    .transfer-bar-fill.error {
      background: #f87171;
      box-shadow: none;
    }





  </style>
</head>
<body>
    <!-- ==========================
      PROGRESS BAR GLOBAL
  ========================== -->
  <div id="progressWrapper" class="progress-wrapper">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- ==========================
       SIDEBAR
       ========================== -->
  <div class="sidebar">
    <div class="logo">ATLAS</div>

    <!-- Ligado ao JS -->
    <div class="nav-item" onclick="fetchFiles('/')">Inicio</div>
    <div class="nav-item">Recentes</div>
    <div class="nav-item">Favoritos</div>
    <div class="nav-item">Lixeira</div>
  </div>

  <!-- ==========================
       MAIN AREA
       ========================== -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">

      <!-- BOTÃO VOLTAR -->
      <button id="backButton" title="Voltar" style="
        background: none;
        border: none;
        color: var(--text-secondary);
        font-size: 20px;
        margin-right: 10px;
        cursor: pointer;
        transition: 0.2s;
      ">Voltar</button>

      <!-- CAMINHO DINÂMICO -->
      <!-- JS: aqui você atualiza o caminho atual -->
      <div class="path" id="currentPath" style="display:flex; gap:6px; flex-wrap:wrap;"></div>


      <div class="actions">
        <!-- JS: botão para upload -->
        <button onclick="uploadFile()">Upload</button>
      </div>
    </div>

    <!-- FILES GRID -->
    <div class="file-container" id="fileContainer">

      <!-- ==========================
           TEMPLATE DE ARQUIVO
           DUPLICAR VIA JS
      ========================== -->

      <!-- EXEMPLO ESTÁTICO -->
      <!--<div class="file-card" onclick="openItem('pasta1')">
        <div class="file-icon">📁</div>
        <div class="file-name">Pasta 1</div>
        <div class="file-meta">Pasta</div>
      </div>

      <div class="file-card" onclick="openItem('arquivo.txt')">
        <div class="file-icon">📄</div>
        <div class="file-name">arquivo.txt</div>
        <div class="file-meta">2 KB</div>
      </div> -->

    </div>
  </div>



  <div id="contextMenu" class="context-menu">
    <div class="context-menu-item" id="visualizarItem">Visualizar Item</div>
    <div class="context-menu-item" id="downloadOption">Baixar arquivo</div>
    <div class="context-menu-item" id="MudarNomeOption">Renomear Item</div>
    <div class="context-menu-item" id="deletarArquivo">Deletear Item</div>

      <!-- 🔥 NOVOS ITENS (área vazia) -->
    <div class="context-menu-item" id="criarArquivo">Criar documento de texto</div>
    <div class="context-menu-item" id="criarPasta">Criar nova pasta</div>
  </div>



  <!-- ==========================
      MODAL RENOMEAR ARQUIVO
  ========================== -->
  <div id="renameModal" class="rename-modal">
    <div class="rename-box">
      <h3>Renomear Item</h3>
      <input type="text" id="renameInput" placeholder="Novo nome..." />
      
      <div class="rename-actions">
        <button id="cancelRename">Cancelar</button>
        <button id="confirmRename">Salvar</button>
      </div>
    </div>
  </div>


  
  <div id="previewModal" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(2,6,23,0.85);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;

    opacity: 0;
    pointer-events: none;
    transition: 0.25s;
  ">
    <div style="
      width: 80%;
      height: 80%;
      background: #020617;
      border-radius: 12px;
      border: 1px solid rgba(34,211,238,0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    ">

      <!-- HEADER -->
      <div id="previewHeader" style="
        padding: 15px 20px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        font-size: 18px;
        color: var(--neon);
        font-weight: bold;
      ">
        Nome do arquivo
      </div>

      <!-- CONTEÚDO -->
      <div id="previewContent" style="
        flex: 1;
        padding: 20px;
        overflow: auto;
      ">
      </div>

    </div>
  </div>


  <div id="selectionBox" style="
    position: fixed;
    border: 1px dashed #22d3ee;
    background: rgba(34, 211, 238, 0.1);
    pointer-events: none;
    display: none;
    z-index: 9999;
  "></div>



  <div id="selectionInfo" style="
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #0f172a;
    border: 1px solid rgba(34,211,238,0.2);
    border-radius: 12px;
    padding: 12px 16px;
    color: #e2e8f0;
    font-size: 13px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    display: none;
    max-width: 260px;
    z-index: 9999;
  ">
  </div>


  <!-- PAINEL DE TRANSFERÊNCIAS (canto inferior esquerdo) -->
  <div id="transferPanel" style="
    position: fixed;
    bottom: 20px;
    left: 20px;
    width: 320px;
    background: #0f172a;
    border: 1px solid rgba(34,211,238,0.2);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    z-index: 9998;
    display: none;
    flex-direction: column;
  ">
    <!-- HEADER -->
    <div style="
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
    " id="transferPanelHeader">
      <span style="color:#e2e8f0; font-size:13px; font-weight:600;">Transferências</span>
      <div style="display:flex; gap:10px; align-items:center;">
        <span id="transferToggleIcon" style="color:#94a3b8; font-size:16px;">▾</span>
        <span id="transferCloseBtn" style="color:#94a3b8; font-size:16px; cursor:pointer;">✕</span>
      </div>
    </div>

    <!-- LISTA DE TAREFAS -->
    <div id="transferList" style="
      max-height: 280px;
      overflow-y: auto;
      padding: 8px 0;
    "></div>
  </div>




  <script src="script.js"></script>




</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATLAS — Auditoria do Sistema</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-grid"></div>

  <!-- ── HEADER ── -->
  <header class="header">
    <div class="header-left">
      <a href="../index.html" class="header-back">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Voltar
      </a>
      <div class="header-divider"></div>
      <div class="logo">
        <span class="logo-mark">▲</span>
        <span class="logo-text">ATLAS</span>
        <span class="logo-role">auditoria</span>
      </div>
    </div>

    <div class="header-right">
      <div class="live-indicator">
        <span class="live-dot"></span>
        <span class="live-label" id="liveLabel">—</span>
      </div>
      <button id="themeToggle" class="icon-btn" aria-label="Alternar tema">🌙</button>
    </div>
  </header>

  <!-- ── LAYOUT PRINCIPAL ── -->
  <div class="audit-layout">

    <!-- ── SIDEBAR: Lista de arquivos ── -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <p class="sidebar-title">Fontes de log</p>
        <button class="btn-refresh" id="btnRefresh" title="Recarregar arquivo atual">
          <svg id="refreshIcon" xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
      </div>

      <nav class="file-list">

        <button class="file-item" data-file="auth.log" data-type="auth">
          <div class="file-icon file-icon--auth">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
          <div class="file-info">
            <span class="file-name">auth.log</span>
            <span class="file-desc">Tentativas de login</span>
          </div>
          <span class="file-count" id="count-auth">—</span>
        </button>

        <button class="file-item" data-file="create.log" data-type="create">
          <div class="file-icon file-icon--create">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
          </div>
          <div class="file-info">
            <span class="file-name">create.log</span>
            <span class="file-desc">Criação de usuários</span>
          </div>
          <span class="file-count" id="count-create">—</span>
        </button>

        <button class="file-item" data-file="deletarUser.log" data-type="delete">
          <div class="file-icon file-icon--delete">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          </div>
          <div class="file-info">
            <span class="file-name">deletarUser.log</span>
            <span class="file-desc">Remoções de usuário</span>
          </div>
          <span class="file-count" id="count-delete">—</span>
        </button>

        <button class="file-item" data-file="updateUser.log" data-type="update">
          <div class="file-icon file-icon--update">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </div>
          <div class="file-info">
            <span class="file-name">updateUser.log</span>
            <span class="file-desc">Atualizações de dados</span>
          </div>
          <span class="file-count" id="count-update">—</span>
        </button>


        <button class="file-item" data-file="impersonateUser.log" data-type="impersonate">
          <div class="file-icon file-icon--impersonate">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
          </div>
          <div class="file-info">
            <span class="file-name">impersonateUser.log</span>
            <span class="file-desc">Tentativas de impersonate</span>
          </div>
          <span class="file-count" id="count-impersonate">—</span>
        </button>

      </nav>

      <!-- Estatísticas rápidas -->
      <div class="sidebar-stats">
        <div class="stat-item">
          <span class="stat-label">Total exibido</span>
          <span class="stat-value" id="statTotal">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Após filtro</span>
          <span class="stat-value accent" id="statFiltered">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Sucessos</span>
          <span class="stat-value green" id="statSuccess">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Falhas</span>
          <span class="stat-value red" id="statFail">—</span>
        </div>
      </div>
    </aside>

    <!-- ── PAINEL DIREITO ── -->
    <div class="log-panel">

      <!-- Toolbar de filtros -->
      <div class="filter-bar">
        <div class="filter-search">
          <svg class="filter-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input
            type="text"
            id="filterText"
            class="filter-input"
            placeholder="Filtrar por IP, usuário, ID, texto..."
          />
          <button class="filter-clear hidden" id="filterClear" title="Limpar filtro">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="filter-chips">
          <button class="chip chip--active" data-status="all">Todos</button>
          <button class="chip chip--success" data-status="sucesso">Sucesso</button>
          <button class="chip chip--fail" data-status="falha">Falha</button>
        </div>

        <div class="filter-sort">
          <button class="sort-btn active" id="sortDesc" title="Mais recentes primeiro">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
            Recentes
          </button>
          <button class="sort-btn" id="sortAsc" title="Mais antigos primeiro">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
            Antigos
          </button>
        </div>
      </div>

      <!-- Área de logs -->
      <div class="log-area" id="logArea">
        <!-- Estado inicial -->
        <div class="log-empty" id="logEmpty">
          <div class="log-empty-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          </div>
          <p class="log-empty-title">Selecione um arquivo</p>
          <p class="log-empty-sub">Escolha uma fonte de log na barra lateral para começar a investigar.</p>
        </div>
      </div>

    </div>
  </div>

  <script src="../../../config.js"></script>
  <script src="script.js"></script>
</body>
</html>

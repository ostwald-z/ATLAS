<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATLAS — Criar Usuário</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="header">
    <div class="logo">
      <span class="logo-mark">▲</span>
      <span class="logo-text">ATLAS</span>
    </div>
    <button id="darkModeToggle" class="icon-btn" aria-label="Alternar tema" title="Modo escuro">🌙</button>
  </header>

  <main class="main">

    <div class="page-intro">
      <p class="page-label">Sistema privado</p>
      <h1 class="page-title">Criar <span class="accent">usuário</span></h1>
      <p class="page-sub">Preencha os dados e as chaves de autorização para registrar um novo acesso.</p>
    </div>

    <div class="form-card">

      <!-- ── Seção: Dados pessoais ── -->
      <div class="section-label">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Dados do usuário
      </div>

      <div class="field">
        <label class="field-label" for="inputNome">Nome completo</label>
        <input id="inputNome" class="field-input" type="text" placeholder="Ex: João da Silva" autocomplete="name" />
      </div>

      <div class="field">
        <label class="field-label" for="inputUser">Usuário</label>
        <div class="field-input-wrap">
          <span class="field-prefix">@</span>
          <input id="inputUser" class="field-input field-input--prefixed" type="text" placeholder="joao_silva" autocomplete="username" />
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="inputEmail">E-mail</label>
        <input id="inputEmail" class="field-input" type="email" placeholder="joao@email.com" autocomplete="email" />
      </div>

      <div class="field">
        <label class="field-label" for="inputSenha">Senha</label>
        <div class="field-input-wrap">
          <input id="inputSenha" class="field-input field-input--suffixed" type="password" placeholder="••••••••" autocomplete="new-password" />
          <button type="button" class="field-toggle-pw" id="toggleSenha" aria-label="Mostrar senha">
            <svg id="eyeIconSenha" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="inputObs">
          Observações
          <span class="field-hint">opcional</span>
        </label>
        <textarea id="inputObs" class="field-input field-input--textarea" placeholder="Alguma nota sobre este usuário..." rows="3"></textarea>
      </div>

      <div class="form-divider"></div>

      <!-- ── Seção: Chaves especiais ── -->
      <div class="section-label section-label--keys">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
        Chaves de autorização
      </div>

      <div class="keys-grid">
        <div class="field">
          <label class="field-label" for="inputMagicCriar">
            Chave de criação
            <span class="field-badge">magicCriar</span>
          </label>
          <div class="field-input-wrap">
            <input id="inputMagicCriar" class="field-input field-input--key field-input--suffixed" type="password" placeholder="••••••••••••" />
            <button type="button" class="field-toggle-pw" data-target="inputMagicCriar" aria-label="Mostrar chave">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="inputMagicRole">
            Chave de privilégio
            <span class="field-badge">magicRole</span>
          </label>
          <div class="field-input-wrap">
            <input id="inputMagicRole" class="field-input field-input--key field-input--suffixed" type="password" placeholder="••••••••••••" />
            <button type="button" class="field-toggle-pw" data-target="inputMagicRole" aria-label="Mostrar chave">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="inputNoPending">
            Chave NoPending
            <span class="field-badge">chaveNoPending</span>
          </label>
          <div class="field-input-wrap">
            <input id="inputNoPending" class="field-input field-input--key field-input--suffixed" type="password" placeholder="••••••••••••" />
            <button type="button" class="field-toggle-pw" data-target="inputNoPending" aria-label="Mostrar chave">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Feedback -->
      <div id="formFeedback" class="form-feedback" aria-live="polite"></div>

      <!-- Resposta do backend -->
      <div id="backendResponse" class="backend-response hidden">
        <div class="backend-response__label">
          <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          Resposta do servidor
        </div>
        <pre id="backendResponseText"></pre>
      </div>

      <!-- Ações -->
      <div class="form-actions">
        <button type="button" id="btnReset" class="btn btn--ghost">Limpar</button>
        <button type="button" id="btnCriar" class="btn btn--primary">
          <span id="btnCriarLabel">Criar usuário</span>
          <svg id="btnCriarSpinner" class="btn-spinner hidden" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>
        </button>
      </div>

    </div>

  </main>

  <script src="../../config.js"></script>
  <script src="script.js"></script>
</body>
</html>

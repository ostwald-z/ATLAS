<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ATLAS // Special Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!--
    ATLAS Special Login
    Tema: Neon Tech / Acesso Restrito
    Cores principais:
    - Neon ATLAS: #22d3ee
    - Texto secundário: #94a3b8
-->

<style>

/* ===========================
   IMPORTAÇÃO DE FONTE TECH
   =========================== */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

/* ===========================
   RESET BÁSICO
   =========================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', system-ui, sans-serif;
}

/* ===========================
   VARIÁVEIS DE TEMA
   =========================== */
:root {
    --atlas-neon: #22d3ee;
    --atlas-secondary: #94a3b8;
    --bg-dark: #020617;
    --bg-panel: rgba(8, 12, 22, 0.75);
}

/* ===========================
   FUNDO GLOBAL
   =========================== */
html, body {
    height: 100%;
    background:
        radial-gradient(circle at top, rgba(34,211,238,0.08), transparent 60%),
        linear-gradient(180deg, #020617, #000);
    color: var(--atlas-secondary);
    overflow: hidden;
}

/* ===========================
   EFEITO CRT - SCANLINES
   =========================== */
.scanlines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
        repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,0.03),
            rgba(255,255,255,0.03) 1px,
            transparent 1px,
            transparent 3px
        );
    mix-blend-mode: overlay;
    opacity: 0.25;
}

/* ===========================
   EFEITO CRT - DISTORÇÃO SUAVE
   =========================== */
.crt {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(
        ellipse at center,
        transparent 40%,
        rgba(0,0,0,0.4) 100%
    );
}

/* ===========================
   CONTAINER CENTRAL
   =========================== */
.container {
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ===========================
   PAINEL PRINCIPAL
   =========================== */
.panel {
    width: 420px;
    padding: 48px;
    background: var(--bg-panel);
    border-radius: none;
    border: 1px solid rgba(34,211,238,0.18);
    box-shadow:
        0 0 60px rgba(0,0,0,0.9),
        inset 0 0 40px rgba(34,211,238,0.04);
    backdrop-filter: blur(14px);
}

/* ===========================
   TÍTULO
   =========================== */
h1 {
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 36px;
    color: var(--atlas-neon);
    letter-spacing: 0.5px;
}

/* ===========================
   CAMPOS DE INPUT
   =========================== */
.field {
    margin-bottom: 26px;
}

label {
    display: block;
    font-size: 12px;
    margin-bottom: 8px;
    color: var(--atlas-secondary);
}

input {
    width: 100%;
    padding: 14px 16px;
    background: rgba(2,6,23,0.8);
    border-radius: 10px;
    border: 1px solid rgba(148,163,184,0.25);
    color: var(--atlas-neon);
    font-size: 14px;
    outline: none;
    transition: all 0.25s ease;
}

input::placeholder {
    color: rgba(148,163,184,0.35);
}

input:focus {
    border-color: var(--atlas-neon);
    box-shadow: 0 0 0 2px rgba(34,211,238,0.15);
}

/* ===========================
   BOTÃO
   =========================== */
button {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(
        135deg,
        rgba(34,211,238,0.25),
        rgba(34,211,238,0.1)
    );
    color: var(--atlas-neon);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
}

button:hover {
    box-shadow: 0 0 30px rgba(34,211,238,0.45);
    transform: translateY(-1px);
}

/* ===========================
   RODAPÉ SUTIL
   =========================== */
.footer {
    margin-top: 32px;
    font-size: 11px;
    text-align: center;
    color: rgba(148,163,184,0.4);
}


</style>
</head>

<body>

<!-- Camadas de efeito CRT -->
<div class="scanlines"></div>
<div class="crt"></div>



<div class="container">
    <div class="panel">
        <h1>ATLAS • Special Login</h1>

        <div class="field">
            <label>User ID</label>
            <input type="text" placeholder="internal.identifier" id="idUser">
        </div>

        <div class="field">
            <label>Atlas Key</label>
            <input type="password" placeholder="••••••••••••" id="chaveimpersonate">
        </div>

        <p id="erro"></p>

        <button id="login" type="button">Access</button>

        <div class="footer">
            Private Interface · Atlas System
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
